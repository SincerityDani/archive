name: Generate Projects List

on:
  push:
    paths:
      - 'projects/**'
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate JSON list with Auto Tags
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");
            const dir = "./projects";
            if (!fs.existsSync(dir)) process.exit(0);

            // 주요 키워드 사전 (필요시 단어 추가 가능)
            const keywordDict = [
              "HR", "성과체계", "브랜딩", "벤치마킹", "평가", "교육", "AI", "프롬프트", 
              "금융", "전략", "기획", "디자인", "보고서", "가이드", "역량", "채용", "조직"
            ];

            const files = fs.readdirSync(dir)
              .filter(f => f.endsWith(".html"))
              .map(f => {
                const filePath = path.join(dir, f);
                const stat = fs.statSync(filePath);
                const content = fs.readFileSync(filePath, "utf8");

                // HTML 태그 제거 후 순수 텍스트만 추출
                const plainText = content.replace(/<[^>]+>/g, " ");

                // 본문 및 파일명에서 키워드 빈도 추출
                const tags = [];
                const fullNameAndContent = f + " " + plainText;

                keywordDict.forEach(kw => {
                  if (fullNameAndContent.includes(kw)) {
                    tags.push(kw);
                  }
                });

                // 최대 3개 태그만 추출
                const finalTags = tags.slice(0, 3);

                return { 
                  name: f.replace(".html", ""), 
                  filename: f, 
                  mtime: stat.mtimeMs,
                  tags: finalTags
                };
              })
              .sort((a, b) => b.mtime - a.mtime);

            fs.writeFileSync("projects.json", JSON.stringify(files, null, 2));
          '

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add projects.json
          git commit -m "Auto-update projects.json with tags [skip ci]" || exit 0
          git push
