<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Output Archive</title>
  <!-- Pretendard Web Font -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --bg-color: #0b0f17;
      --card-bg: #161f30;
      --card-border: #233148;
      --card-hover-border: #38bdf8;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-color: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.15);
      --input-bg: #111827;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.6;
      padding: 40px 20px 80px;
      min-height: 100vh;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    /* Hero Section */
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--card-border);
      margin-bottom: 32px;
      gap: 20px;
      flex-wrap: wrap;
    }

    .hero-title h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hero-title h1 span.badge {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-color);
      background: var(--accent-glow);
      border: 1px solid rgba(56, 189, 248, 0.3);
      padding: 2px 10px;
      border-radius: 20px;
    }

    .hero-title p {
      color: var(--text-muted);
      font-size: 15px;
      margin-top: 8px;
    }

    .hero-stats {
      display: flex;
      gap: 16px;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 12px 20px;
      text-align: right;
    }

    .stat-card .value {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-color);
    }

    .stat-card .label {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Controls (Search & Sort) */
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 240px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 12px 16px 12px 40px;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .search-box::before {
      content: "🔍";
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      opacity: 0.6;
    }

    .sort-select {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 0 16px;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }

    .sort-select:focus {
      border-color: var(--accent-color);
    }

    /* Grid & Cards */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 22px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 140px;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .card:hover {
      border-color: var(--card-hover-border);
      transform: translateY(-4px);
      box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.5), 0 0 0 1px var(--accent-glow);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .card-icon {
      font-size: 22px;
      line-height: 1;
      padding: 8px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 8px;
    }

    .card h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-main);
      word-break: break-keep;
      line-height: 1.4;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 12px;
      color: var(--text-muted);
    }

    .card-link-text {
      color: var(--accent-color);
      font-weight: 500;
    }

    .empty-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 0;
      color: var(--text-muted);
      background: var(--card-bg);
      border: 1px dashed var(--card-border);
      border-radius: 14px;
    }

    @media (max-width: 600px) {
      .hero { flex-direction: column; align-items: flex-start; }
      .hero-stats { width: 100%; }
      .stat-card { flex: 1; text-align: left; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Hero Section -->
    <header class="hero">
      <div class="hero-title">
        <h1>AI Archive <span class="badge">LIVE</span></h1>
        <p>생성형 AI로 제작된 프로젝트 및 웹 결과물 아카이브입니다.</p>
      </div>
      <div class="hero-stats">
        <div class="stat-card">
          <div class="value" id="total-count">0</div>
          <div class="label">Total Projects</div>
        </div>
      </div>
    </header>

    <!-- Controls -->
    <div class="controls">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="프로젝트 검색..." oninput="handleFilter()">
      </div>
      <select class="sort-select" id="sort-select" onchange="handleFilter()">
        <option value="latest">최신순</option>
        <option value="oldest">오래된순</option>
        <option value="name">이름순</option>
      </select>
    </div>

    <!-- Main Card Grid -->
    <main>
      <div id="project-list" class="card-grid">
        <!-- JS로 동적 생성 -->
      </div>
    </main>
  </div>

  <script>
    let rawProjects = [];

    // 키워드별 아이콘 자동 매칭 함수
    function getIcon(name) {
      if (name.includes('브랜딩') || name.includes('디자인')) return '🎨';
      if (name.includes('벤치마킹') || name.includes('금융') || name.includes('분석')) return '📊';
      if (name.includes('AI') || name.includes('모델')) return '🤖';
      if (name.includes('기획') || name.includes('전략')) return '💡';
      if (name.includes('보고서') || name.includes('요약')) return '📝';
      return '📄';
    }

    async function fetchProjects() {
      try {
        const res = await fetch('./projects.json?v=' + new Date().getTime());
        if (!res.ok) throw new Error('Failed to load JSON');
        rawProjects = await res.json();
        
        document.getElementById('total-count').textContent = rawProjects.length;
        handleFilter();
      } catch (err) {
        console.error(err);
        document.getElementById('project-list').innerHTML = `
          <div class="empty-msg">
            아직 업로드된 작업물이 없거나 데이터 불러오기에 실패했습니다.
          </div>`;
      }
    }

    function handleFilter() {
      const query = document.getElementById('search-input').value.trim().toLowerCase();
      const sortType = document.getElementById('sort-select').value;
      const container = document.getElementById('project-list');

      // 1. Filter
      let filtered = rawProjects.filter(p => p.name.toLowerCase().includes(query));

      // 2. Sort
      if (sortType === 'latest') {
        filtered.sort((a, b) => b.mtime - a.mtime);
      } else if (sortType === 'oldest') {
        filtered.sort((a, b) => a.mtime - b.mtime);
      } else if (sortType === 'name') {
        filtered.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
      }

      // 3. Render
      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-msg">검색 결과가 없습니다.</div>`;
        return;
      }

      container.innerHTML = filtered.map(item => {
        const icon = getIcon(item.name);
        return `
          <a href="./projects/${encodeURIComponent(item.filename)}" class="card" target="_blank">
            <div class="card-header">
              <span class="card-icon">${icon}</span>
              <h3>${item.name}</h3>
            </div>
            <div class="card-footer">
              <span>웹 렌더링</span>
              <span class="card-link-text">열기 →</span>
            </div>
          </a>
        `;
      }).join('');
    }

    fetchProjects();
  </script>
</body>
</html>
