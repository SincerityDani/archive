name: Generate Projects List

on:
  push:
    paths:
      - 'projects/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate JSON list with Auto Tags
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");
            const dir = "./projects";
            if (!fs.existsSync(dir)) process.exit(0);

            // 한글/영문 키워드 사전
            const keywordMap = [
              { key: ["HR", "성과", "evaluation", "finance", "금융", "벤치마킹", "benchmark"], tag: "성과/금융" },
              { key: ["브랜딩", "branding", "디자인", "design", "recommendation"], tag: "브랜딩" },
              { key: ["AI", "LLM", "gpt", "모델"], tag: "AI" },
              { key: ["교육", "training", "가이드", "보고서"], tag: "리포트" },
              { key: ["기획", "전략", "system", "시스템"], tag: "기획" }
            ];

            const files = fs.readdirSync(dir)
              .filter(f => f.endsWith(".html"))
              .map(f => {
                const filePath = path.join(dir, f);
                const stat = fs.statSync(filePath);
                const content = fs.readFileSync(filePath, "utf8");

                // HTML 태그 제거 후 텍스트 추출
                const plainText = content.replace(/<[^>]+>/g, " ");
                const targetText = (f + " " + plainText).toLowerCase();

                const tags = new Set();

                keywordMap.forEach(item => {
                  if (item.key.some(k => targetText.includes(k.toLowerCase()))) {
                    tags.add(item.tag);
                  }
                });

                // 매칭되는 게 없으면 기본 태그 부여
                if (tags.size === 0) {
                  tags.add("AI");
                  tags.add("결과물");
                }

                return { 
                  name: f.replace(".html", ""), 
                  filename: f, 
                  mtime: stat.mtimeMs,
                  tags: Array.from(tags).slice(0, 3)
                };
              })
              .sort((a, b) => b.mtime - a.mtime);

            fs.writeFileSync("projects.json", JSON.stringify(files, null, 2));
          '

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add projects.json
          git commit -m "Auto-update projects.json with smart tags [skip ci]" || exit 0
          git push
